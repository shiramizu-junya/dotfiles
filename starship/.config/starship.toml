"$schema" = 'https://starship.rs/config-schema.json'
# ============================================================
# Starship 設定 — パワーライン形式（2設定を統合）
# 必要フォント: JetBrainsMono Nerd Font Mono（iTerm2 の Normal Font に設定）
# ※ iTerm2: Settings > Profiles > Colors > Minimum Contrast = 0
# ------------------------------------------------------------
# 左側  : directory → git → 言語ランタイム → クラウド/コンテナ → 実行時間/ジョブ
# 右端  : 時刻（$fill で右寄せ）
# 2行目 : プロンプト記号
# ============================================================
scan_timeout = 30
command_timeout = 1000   # java/ruby 等の遅いバージョン取得を取りこぼさない余裕値
add_newline = true

format = """
[](fg:color_orange)\
$directory\
[](fg:color_orange bg:color_green)\
$git_branch\
$git_status\
$git_state\
[](fg:color_green bg:color_teal)\
$nodejs\
$python\
$rust\
$golang\
$java\
$ruby\
[](fg:color_teal bg:color_brown)\
$docker_context\
$aws\
$gcloud\
[](fg:color_brown bg:color_gray)\
$cmd_duration\
$jobs\
[](fg:color_gray)\
$fill\
$time\
$line_break$character"""

palette = "powerline"

[palettes.powerline]
dark   = "#1a1a1a"
light  = "#f0f0f0"
color_orange = "#e07a3f"
color_green  = "#7fb069"
color_teal   = "#5cab9d"
color_brown  = "#7a6a55"
color_gray   = "#4a4a52"

# ------------------------------------------------------------
# ディレクトリ
# ------------------------------------------------------------
[directory]
style = "bg:color_orange fg:dark"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = "  "
read_only_style = "bg:color_orange fg:red"
format = "[ 󰉋 $path ]($style)[$read_only]($read_only_style)"

[directory.substitutions]
"Documents" = "󰈙 Documents"
"Downloads" = " Downloads"
"workspace" = " ws"

# ------------------------------------------------------------
# Git
# ------------------------------------------------------------
[git_branch]
symbol = ""
style = "bg:color_green fg:dark"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:color_green fg:dark"
format = '[$all_status$ahead_behind]($style)'
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "? "
stashed = " "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "

[git_state]
style = "bg:color_green fg:dark"
format = "[ $state( $progress_current/$progress_total) ]($style)"
rebase = "REBASE"
merge = "MERGE"
revert = "REVERT"
cherry_pick = "CHERRY"
bisect = "BISECT"
am = "AM"
am_or_rebase = "AM/REBASE"

# ------------------------------------------------------------
# 言語・ランタイム
# ------------------------------------------------------------
[nodejs]
symbol = ""
style = "bg:color_teal fg:dark"
format = "[ $symbol $version ]($style)"

[python]
symbol = ""
style = "bg:color_teal fg:dark"
format = '[ $symbol $version( $virtualenv) ]($style)'

[rust]
symbol = ""
style = "bg:color_teal fg:dark"
format = "[ $symbol $version ]($style)"

[golang]
symbol = ""
style = "bg:color_teal fg:dark"
format = "[ $symbol $version ]($style)"

[java]
symbol = ""
style = "bg:color_teal fg:dark"
format = "[ $symbol $version ]($style)"

[ruby]
symbol = ""
style = "bg:color_teal fg:dark"
format = "[ $symbol $version ]($style)"

# ------------------------------------------------------------
# クラウド / コンテナ
# ------------------------------------------------------------
[docker_context]
symbol = ""
style = "bg:color_brown fg:light"
format = "[ $symbol $context ]($style)"

[aws]
symbol = ""
style = "bg:color_brown fg:light"
format = '[ $symbol $profile(\($region\)) ]($style)'

[aws.region_aliases]
ap-northeast-1 = "jp"

[gcloud]
symbol = ""
style = "bg:color_brown fg:light"
format = '[ $symbol $account ]($style)'

# ------------------------------------------------------------
# コマンド実行時間 / バックグラウンドジョブ
# ------------------------------------------------------------
[cmd_duration]
min_time = 500
style = "bg:color_gray fg:light"
format = "[ 󰔛 $duration ]($style)"

[jobs]
style = "bg:color_gray fg:light"
format = "[  $number ]($style)"
threshold = 1
number_threshold = 1

# ------------------------------------------------------------
# 右端の余白埋め + 時刻
# ------------------------------------------------------------
[fill]
symbol = "·"
style = "fg:color_gray"

[time]
disabled = false
style = "fg:color_gray"
format = "[  $time ](fg:color_gray)"
time_format = "%H:%M"

# ------------------------------------------------------------
# プロンプト記号（2行目）
# ------------------------------------------------------------
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"
