# ============================================================
# tmux設定ファイル (.tmux.conf)
# 目的: tmuxを快適に使い、Vimと連携させる
# ============================================================

# ============================================================
# 1. プレフィックスキーの変更
# ============================================================
# 【説明】デフォルトのCtrl+bからCtrl+aに変更
# 理由: Ctrl+aの方が左手で押しやすい

unbind C-b              # デフォルトのCtrl+bを解除
set -g prefix C-a       # プレフィックスをCtrl+aに設定
bind C-a send-prefix    # Ctrl+a Ctrl+aで実際のCtrl+aを送信

# ============================================================
# 2. 基本設定
# ============================================================

# --- マウス操作 ---
set -g mouse on         # マウスでペイン選択やリサイズが可能

# --- ウィンドウ・ペイン番号 ---
set -g base-index 1                # ウィンドウ番号を1から開始
setw -g pane-base-index 1          # ペイン番号を1から開始
set -g renumber-windows on         # ウィンドウを閉じたら番号を詰める

# --- キー入力 ---
set -sg escape-time 0              # ESCキーの遅延をなくす（Vim快適化）
set -g history-limit 50000         # コマンド履歴の上限（開発ログを追いやすく増量）

# --- フォーカス・連携 ---
# 【説明】これらは抜けていると地味に不便な必須級の設定
set -g focus-events on             # フォーカス変化をアプリに通知（Vimのautoread/FocusGained、ペイン切替検知）
setw -g aggressive-resize on       # ウィンドウサイズ変動時にペインを積極リサイズ（iTermウィンドウのリサイズに追従）
set -g set-clipboard on            # OSC52でシステムクリップボードへ連携（sshリモートのコピーもローカルへ）

# ============================================================
# 3. 色・見た目の設定
# ============================================================

# --- 256色対応 ---
# 【説明】tmux内でもVimの色が綺麗に表示されます
#   screen-256color は拡張キー非対応の古い端末タイプなので tmux-256color に変更
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # 旧式の truecolor フラグ（互換のため残す）
# tmux 3.2+ の公式な 24bit カラー指定。Tc と役割は同じだが RGB が正式・確実。
set -as terminal-features "xterm-256color:RGB"

# --- 拡張キー（Shift+Enter など修飾キー付き）---
# 【説明】Claude Code 等で Shift+Enter による改行を効かせるために必要
#   tmux はデフォルトで修飾キー付き Enter をアプリへ渡さないので明示的に有効化する
#   ※ extended-keys はサーバー全体のオプション。反映には tmux サーバー再起動推奨
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# --- ステータスバーの色 ---
set -g status-style bg=colour235,fg=colour136
setw -g window-status-style fg=colour244
setw -g window-status-current-style fg=colour166,bold

# --- ペインの境界線 ---
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour136

# --- メッセージ ---
set -g message-style fg=colour166,bg=colour235

# ============================================================
# 4. ステータスバー
# ============================================================

set -g status on                           # ステータスバーを表示
set -g status-position bottom              # 下部に表示
set -g status-interval 5                   # 5秒ごとに更新（分表示なので秒更新は不要）

# 左側の表示
set -g status-left-length 40
set -g status-left "#[fg=colour166,bold]❐ #S #[fg=colour244]» "

# 右側の表示
set -g status-right-length 100
set -g status-right "#[fg=colour244]« #[fg=colour166]%Y/%m/%d %H:%M"

# ウィンドウリストの表示位置
set -g status-justify centre               # 中央揃え

# ============================================================
# 5. キーバインド設定
# ============================================================

# --- 設定ファイルのリロード ---
# 【説明】Ctrl+a rで設定ファイルを再読み込み
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- ペイン分割 ---
# 【説明】|で縦分割、-で横分割、現在のディレクトリで開く
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- ペイン移動（vim-tmux-navigator連携）---
# 【重要】Ctrl+h/j/k/lでVimとtmuxをシームレスに移動
# この設定でVim内でもtmuxペイン間でも同じキーで移動できます

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# --- ペインのリサイズ ---
# 【説明】Ctrl+a H/J/K/Lでペインのサイズを変更
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- ウィンドウ操作 ---
# 新しいウィンドウを現在のディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# ウィンドウの移動（prefix + C-p/C-n）
#   ルートテーブルの C-h/C-l はペイン移動(vim連携)に使うため、ウィンドウ移動は
#   役割が衝突しない C-p(前)/C-n(次) に分離した。-r で連打移動できる。
bind -r C-p select-window -t :-   # 前のウィンドウへ
bind -r C-n select-window -t :+   # 次のウィンドウへ

# --- コピーモード（vimライク）---
# 【説明】Vimと同じキーバインドでコピーできます
bind [ copy-mode                                      # Ctrl+a [でコピーモード開始

# vimライクな選択
bind -T copy-mode-vi v send-keys -X begin-selection  # vで選択開始
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle # Ctrl+vで矩形選択
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"  # yでヤンク
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"  # Enterでもヤンク

# ペースト
bind ] paste-buffer                                   # Ctrl+a ]でペースト

# ============================================================
# 6. プラグイン管理（TPM - Tmux Plugin Manager）
# ============================================================

# TPMのパス
set -g @plugin 'tmux-plugins/tpm'

# --- プラグイン ---
set -g @plugin 'tmux-plugins/tmux-sensible'      # 基本設定の改善
set -g @plugin 'tmux-plugins/tmux-resurrect'     # セッションの保存・復元
set -g @plugin 'tmux-plugins/tmux-continuum'     # 自動保存・自動復元
set -g @plugin 'tmux-plugins/tmux-yank'          # ヤンクの改善
# tmux-pain-control / themepack は撤去
#   理由1: pain-control は |, -, H/J/K/L を独自に割り当て、TPM初期化時に
#          読まれるため、セクション5の自前バインド（-c "#{pane_current_path}" 付き）を
#          上書きしてしまう。自前定義で同等の操作を網羅済みなので不要。
#   理由2: themepack はステータスバーの色を上書きし、セクション3の手動色設定を
#          無効化していた。手動スタイルだけにするため撤去。

# --- プラグイン設定 ---

# tmux-resurrect: vimセッションも保存
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-capture-pane-contents 'on'

# tmux-resurrect: 復元対象のプロセス（デフォルトは復元されないためオプトイン）
set -g @resurrect-processes 'claude "uv run python app.py"'

# tmux-continuum: 自動保存・復元（15分ごと）
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ============================================================
# 7. その他の便利な設定
# ============================================================

# ビジュアルアラート
setw -g monitor-activity on        # アクティビティを監視
set -g visual-activity off          # 通知を表示しない

# ペインの同期トグル
# 【説明】Ctrl+a Sで全ペインに同じ入力を送信できます
bind S setw synchronize-panes

# ペインの最大化トグル
# 【説明】Ctrl+a mでペインを最大化/復元できます
bind m resize-pane -Z

# ============================================================
# TPMの初期化（必ず最後に記述）
# ============================================================

# TPMを初期化
run '~/.tmux/plugins/tpm/tpm'

# 【補足】themepack を撤去したため、以前ここにあった status-left/right の
#         再上書きは不要になった（セクション4の定義がそのまま反映される）。
